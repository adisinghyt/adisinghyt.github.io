<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Adi Singh | Coding & Tech</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#0f172a;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 8%;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
color:#38bdf8;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
}

nav a:hover{
color:#38bdf8;
}

/* HERO */

.hero{
height:70vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:45px;
}

.hero p{
color:#94a3b8;
}

.hero button{
margin-top:20px;
padding:12px 28px;
background:#38bdf8;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* SECTION */

section{
padding:70px 8%;
}

.title{
text-align:center;
font-size:30px;
margin-bottom:40px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
text-align:center;
}

/* VIDEO */

iframe{
width:100%;
height:350px;
border-radius:10px;
border:none;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#020617;
color:#94a3b8;
}

</style>
</head>

<body>

<header>

<div class="logo">Adi Singh</div>

<nav>
<a href="#">Home</a>
<a href="#videos">Videos</a>
<a href="https://youtube.com/@adisingh.9">YouTube</a>
</nav>

</header>


<div class="hero">

<h1>Adi Singh</h1>

<p>Coding • AI Tools • Tech Tutorials</p>

<a href="https://youtube.com/@adisingh.9">
<button>Subscribe Channel</button>
</a>

</div>


<section id="videos">

<h2 class="title">Latest Video</h2>

<div class="grid">

<div class="card">

<iframe
src="https://www.youtube.com/embed/g1d5FUxR0Tk">
</iframe>

</div>

</div>

</section>


<footer>

</footer>

</body>
