<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Snake Game</title>

<style>
body{
background:#9bbc0f;
text-align:center;
font-family:monospace;
}

canvas{
background:#8bac0f;
border:10px solid #0f380f;
margin-top:20px;
}

button{
font-size:25px;
padding:10px 20px;
margin:5px;
}
</style>
</head>

<body>

<h2>Nokia Snake</h2>
<p>Score: <span id="score">0</span></p>

<canvas id="game" width="300" height="300"></canvas>

<div>
<button id="up">⬆</button>
</div>

<div>
<button id="left">⬅</button>
<button id="down">⬇</button>
<button id="right">➡</button>
</div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const grid = 15;
const size = 20;

let snake = [{x:10,y:10}];
let direction = "right";

let food = {
x: Math.floor(Math.random()*size),
y: Math.floor(Math.random()*size)
};

let score = 0;

function game(){

ctx.clearRect(0,0,300,300);

let head = {...snake[0]};

if(direction==="right") head.x++;
if(direction==="left") head.x--;
if(direction==="up") head.y--;
if(direction==="down") head.y++;

if(head.x<0) head.x=size-1;
if(head.x>=size) head.x=0;
if(head.y<0) head.y=size-1;
if(head.y>=size) head.y=0;

snake.unshift(head);

if(head.x===food.x && head.y===food.y){

score++;
document.getElementById("score").innerText = score;

food = {
x: Math.floor(Math.random()*size),
y: Math.floor(Math.random()*size)
};

}else{
snake.pop();
}

ctx.fillStyle="#306230";
ctx.fillRect(food.x*grid,food.y*grid,grid,grid);

ctx.fillStyle="#0f380f";

snake.forEach(part=>{
ctx.fillRect(part.x*grid,part.y*grid,grid,grid);
});

for(let i=1;i<snake.length;i++){
if(head.x===snake[i].x && head.y===snake[i].y){
alert("Game Over | Score: "+score);
location.reload();
}
}

}

document.getElementById("up").onclick=()=>{ if(direction!=="down") direction="up" }
document.getElementById("down").onclick=()=>{ if(direction!=="up") direction="down" }
document.getElementById("left").onclick=()=>{ if(direction!=="right") direction="left" }
document.getElementById("right").onclick=()=>{ if(direction!=="left") direction="right" }

document.addEventListener("keydown",e=>{
if(e.key==="ArrowUp" && direction!=="down") direction="up"
if(e.key==="ArrowDown" && direction!=="up") direction="down"
if(e.key==="ArrowLeft" && direction!=="right") direction="left"
if(e.key==="ArrowRight" && direction!=="left") direction="right"
})

setInterval(game,150);

</script>

</body>
</html>
