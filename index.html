<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Hacker Dashboard Demo</title>
<style>
body, html{
  margin:0;
  padding:0;
  height:100%;
  background:black;
  color:#0f0;
  font-family: monospace;
  overflow:hidden;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

header{
  position:relative;
  z-index:1;
  background:#111;
  padding:10px;
  text-align:center;
  font-size:24px;
  border-bottom:1px solid #0f0;
}

.container{
  position:relative;
  z-index:1;
  display:flex;
  height:calc(100% - 50px);
}

.sidebar{
  width:250px;
  background:#111;
  border-right:1px solid #0f0;
  padding:10px;
}

.sidebar p{
  margin:10px 0;
  cursor:pointer;
  transition:0.2s;
}
.sidebar p:hover{
  color:#fff;
}

.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

.terminal{
  background:#000;
  color:#0f0;
  border:1px solid #0f0;
  height:400px;
  padding:10px;
  overflow:auto;
}

input{
  width:100%;
  background:black;
  color:#0f0;
  border:none;
  outline:none;
  font-family: monospace;
  font-size:16px;
}

.bar{
  background:#0f0;
  height:5px;
  width:0%;
  margin-top:5px;
}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>Ultra Hacker Dashboard Demo</header>

<div class="container">
    <div class="sidebar">
        <p onclick="fakeLoad('Network Scan')">Network Scan</p>
        <p onclick="fakeLoad('Password List Fetch')">Password List</p>
        <p onclick="fakeLoad('Packet Analysis')">Packet Analysis</p>
        <p onclick="clearTerminal()">Clear Logs</p>
    </div>
    <div class="main">
        <div class="terminal" id="terminal">
            <p>> Welcome to Ultra Hacker Demo</p>
        </div>
        <input type="text" id="cmd" placeholder="Enter command..." onkeydown="run(event)">
    </div>
</div>

<script>
// Matrix Effect
let canvas = document.getElementById('matrix');
let ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*()*&^%";
letters = letters.split("");
let fontSize = 16;
let columns = canvas.width/fontSize;
let drops = [];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0f0";
  ctx.font = fontSize+"px monospace";
  for(let i=0;i<drops.length;i++){
    let text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0;
    drops[i]++;
  }
}
setInterval(draw,33);

// Terminal Command
function log(text){
    let term = document.getElementById("terminal");
    term.innerHTML += "<p>> "+text+"</p>";
    term.scrollTop = term.scrollHeight;
}

function run(e){
    if(e.key==="Enter"){
        let input = document.getElementById("cmd").value;
        if(input=="clear"){
            clearTerminal();
        } else {
            log(input);
            log("Command executed successfully (Demo)");
        }
        document.getElementById("cmd").value="";
    }
}

function clearTerminal(){
    document.getElementById("terminal").innerHTML="";
}

function fakeLoad(task){
    log(task+" started...");
    let bar = document.createElement("div");
    bar.className="bar";
    document.getElementById("terminal").appendChild(bar);
    let width=0;
    let interval = setInterval(()=>{
        width+=Math.random()*10;
        if(width>=100){
            width=100;
            clearInterval(interval);
            log(task+" completed.");
            bar.remove();
        }
        bar.style.width=width+"%";
    },200);
}
</script>

</body>
</html>
